name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/troydino/hellocicd:latest
            ghcr.io/troydino/hellocicd:${{ github.sha }}
          build-args: |
            APP_ENVIRONMENT=Production

      - name: Update Render secret and deploy
        run: |
          curl --globoff -s -X PATCH \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"THIRD_PARTY_API_KEY","value":"${{ secrets.THIRD_PARTY_API_KEY }}"}]'
          curl --globoff -f "${{ secrets.RENDER_DEPLOY_HOOK }}"